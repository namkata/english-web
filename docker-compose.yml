version: "3.9"

# ============================================================
# English Web — Full Local Stack
# Usage:
#   docker compose up -d              # start everything
#   docker compose up -d postgres redis  # infra only
#   docker compose logs -f web        # tail a service
# ============================================================

services:

  # ── Infrastructure ──────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: ew-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-englishweb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-englishweb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ew-redis
    restart: unless-stopped
    # No password for local dev — set REDIS_PASSWORD in .env for production
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: ew-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Backend Services ─────────────────────────────────────

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: ../../infra/docker/Dockerfile.go
    container_name: ew-auth
    restart: unless-stopped
    environment:
      APP_PORT: ${AUTH_SERVICE_PORT:-4001}
      APP_ENV: ${APP_ENV:-development}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-englishweb}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      DB_NAME: englishweb_auth
      DB_SSLMODE: disable
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-900}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-604800}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
    ports:
      - "${AUTH_SERVICE_PORT:-4001}:${AUTH_SERVICE_PORT:-4001}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  user-service:
    build:
      context: ./services/user-service
      dockerfile: ../../infra/docker/Dockerfile.go
    container_name: ew-user
    restart: unless-stopped
    environment:
      APP_PORT: ${USER_SERVICE_PORT:-4002}
      APP_ENV: ${APP_ENV:-development}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-englishweb}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      DB_NAME: englishweb_users
      DB_SSLMODE: disable
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    ports:
      - "${USER_SERVICE_PORT:-4002}:${USER_SERVICE_PORT:-4002}"
    depends_on:
      postgres:
        condition: service_healthy

  content-service:
    build:
      context: ./services/content-service
      dockerfile: ../../infra/docker/Dockerfile.go
    container_name: ew-content
    restart: unless-stopped
    environment:
      APP_PORT: ${CONTENT_SERVICE_PORT:-4003}
      APP_ENV: ${APP_ENV:-development}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-englishweb}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      DB_NAME: englishweb_content
      DB_SSLMODE: disable
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
    ports:
      - "${CONTENT_SERVICE_PORT:-4003}:${CONTENT_SERVICE_PORT:-4003}"
    depends_on:
      postgres:
        condition: service_healthy

  ai-service:
    build:
      context: ./services/ai-service
      dockerfile: ../../infra/docker/Dockerfile.python
    container_name: ew-ai
    restart: unless-stopped
    environment:
      APP_PORT: ${AI_SERVICE_PORT:-4004}
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-englishweb}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/englishweb_ai
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    ports:
      - "${AI_SERVICE_PORT:-4004}:${AI_SERVICE_PORT:-4004}"
    depends_on:
      postgres:
        condition: service_healthy

  gamification-service:
    build:
      context: ./services/gamification-service
      dockerfile: ../../infra/docker/Dockerfile.go
    container_name: ew-gamification
    restart: unless-stopped
    environment:
      APP_PORT: ${GAMIFICATION_SERVICE_PORT:-4005}
      APP_ENV: ${APP_ENV:-development}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-englishweb}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      DB_NAME: englishweb_gamification
      DB_SSLMODE: disable
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
    ports:
      - "${GAMIFICATION_SERVICE_PORT:-4005}:${GAMIFICATION_SERVICE_PORT:-4005}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── API Gateway ──────────────────────────────────────────

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: ../../infra/docker/Dockerfile.node
    container_name: ew-gateway
    restart: unless-stopped
    environment:
      PORT: ${API_GATEWAY_PORT:-3001}
      NODE_ENV: ${APP_ENV:-development}
      AUTH_SERVICE_URL: http://auth-service:${AUTH_SERVICE_PORT:-4001}
      USER_SERVICE_URL: http://user-service:${USER_SERVICE_PORT:-4002}
      CONTENT_SERVICE_URL: http://content-service:${CONTENT_SERVICE_PORT:-4003}
      AI_SERVICE_URL: http://ai-service:${AI_SERVICE_PORT:-4004}
      GAMIFICATION_SERVICE_URL: http://gamification-service:${GAMIFICATION_SERVICE_PORT:-4005}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      REDIS_URL: redis://redis:6379
    ports:
      - "${API_GATEWAY_PORT:-3001}:${API_GATEWAY_PORT:-3001}"
    depends_on:
      - auth-service
      - user-service
      - content-service
      - ai-service
      - gamification-service

  # ── Frontend ─────────────────────────────────────────────

  web:
    build:
      context: ./apps/web
      dockerfile: ../../infra/docker/Dockerfile.nextjs
    container_name: ew-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${API_GATEWAY_PORT:-3001}
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway

volumes:
  postgres_data:
  redis_data:
  minio_data:
