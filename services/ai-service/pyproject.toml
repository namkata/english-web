[tool.ruff]
line-length = 120
target-version = "py313"
src = ["app", "tests"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "SIM", # flake8-simplify
    "RUF", # ruff-specific rules
]
ignore = [
    "ANN",    # flake8-annotations disabled — FastAPI patterns use implicit types
    "TCH002", # type-checking imports — service layer imports directly
    "TCH003",
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S101", "B017"]
"app/routers/*.py" = ["B008"]  # FastAPI Depends() in defaults is standard
"app/core/response.py" = ["ANN401"]  # response helpers intentionally use Any

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.mypy]
python_version = "3.13"
strict = true
ignore_missing_imports = true
exclude = ["alembic/"]
explicit_package_bases = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = "test_*.py"
python_functions = "test_*"

[tool.coverage.run]
source = ["app"]
omit = ["app/main.py", "alembic/*"]

[tool.coverage.report]
fail_under = 70
show_missing = true
